	<script type="text/javascript">
		
		$(document).ready(function(){		
			$(".close").click(function(){
				$("#alertDialog").hide();
			});
			ot_App.solutionManager.getAutoLogoutDuration(function(autoLogoutTime){
				if (autoLogoutTime !== 0) {
					initInterval(autoLogoutTime);
				}
			});
			
			 $(".header .user-initials").text(getInitials()).attr("title", Globalize.localize("admin.config.avatar"));
		});
		
		function getInitials() { 
			var fullname = DOMPurify.sanitize("AppWorks Admin");
			names = fullname.split(" ");
			var initials = names[0].substring(0, 1);
			if (names.length == 1) {
				initials += names[0].substring(1, 2);
			} else {
				initials += names[names.length - 1].substring(0, 1);
			}
			return initials.toUpperCase();
		}
		
		$("#signout").on("click", function(evt) {
			ot_App.doLogout();
		});
		
		$(".icon .menu-box").parent().on("click", function(evt) {
			if ($(evt.target).is(":input")) {
				evt.stopPropagation();
				return;
			}
			$(this).toggleClass("open").siblings(".open").removeClass("open");
			var position = this.offsetLeft + this.offsetWidth - $(this).find(".menu-box")[0].offsetWidth;
			$(this).find(".menu-box").css("left", position);
			evt.stopPropagation();
		});
		
		$("body").on("click", function(evt) {
			if ($(evt.target).closest(".menu-box").closest(".page-header").length == 0) {
				$(".icon.open").removeClass("open");
			}
			
			if(evt.target.id === "solutions-cfg-panel-icon"){
				$(".solutions-cfg-panel-icon").toggleClass("open");
				return;
			}
			
			if($("#solutions-cfg-panel-icon").attr('class').valueOf() === ("solutions-cfg-panel-icon open")){
				$(".solutions-cfg-panel-icon.open").removeClass("open");
			}
				
			if(evt.target.id === "configurable-elements-panel-icon"){
				$(".configurable-elements-panel-icon").toggleClass("open");
				return;
			}
			
			if($("#configurable-elements-panel-icon").attr('class').valueOf() === ("configurable-elements-panel-icon open")){
				$(".configurable-elements-panel-icon.open").removeClass("open");
			}
			
			if(evt.target.id === "metadata-configurations-panel-icon"){
				$(".metadata-configurations-panel-icon").toggleClass("open");
				return;
			}
			
			if($("#metadata-configurations-panel-icon").attr('class').valueOf() === ("metadata-configurations-panel-icon open")){
				$(".metadata-configurations-panel-icon.open").removeClass("open");
			}
		});
		
	</script>

	<script id="solutions-template" class="template" type="text/template">

							<a href="#" class="list-group-item solution-item" id="W<%= solution.definition.referencedSolutionId %>"
									data-solutionId="<%= solution.definition.referencedSolutionId %>"
									data-workspaceId="<%= solution.id%>"
									data-versionId="<%= solution.definition.info.containerVersions[0].id%>"
									data-tenantVersionId="<%= tenantVersionId %>">
								<span class="workspace-name" title="<%= solution.displayName %>"><%= solution.displayName %></span>

								<% if (solution.usage.hasErrors || solution.usage.errorCount > 0) { %>
									<span class="pull-right"><img src="/home/exampletenant/app/admin/web/images/status_errors.svg" title="<%= Globalize.localize("admin.config.SolutionHasErrors") %>" alt="<%= Globalize.localize("admin.config.SolutionHasErrors") %>" width="16" height="16"></span> 
								<%} else if (!solution.usage.isActive) { %>
									<span class="pull-right"><img id="IMG<%= solution.definition.referencedSolutionId %>" src="/home/exampletenant/app/admin/web/images/status_inactive.svg" title="<%= Globalize.localize("admin.config.SolutionIsNotActive") %>" alt="<%= Globalize.localize("admin.config.SolutionIsNotActive") %>" width="16" height="16"></span>  
								<%} else if (solution.usage.warningCount > 0) { %>
									<span class="pull-right"><img id="IMG<%= solution.definition.referencedSolutionId %>" src="/home/exampletenant/app/admin/web/images/status_warnings.svg" title="<%= Globalize.localize("admin.config.SolutionHasWarnings") %>" alt="<%= Globalize.localize("admin.config.SolutionHasWarnings") %>" width="16" height="16"></span>  
								<%} else { %>
									<span class="pull-right"><img class="status-image" id="IMG<%= solution.definition.referencedSolutionId %>"src="/home/exampletenant/app/admin/web/images/status_active.svg" title="<%= Globalize.localize("admin.config.SolutionIsActive") %>" alt="<%= Globalize.localize("admin.config.SolutionIsActive") %>" width="16" height="16"></span>  
								<%} %>
							</a>
						<%} else { %>
							<a href="#" class="list-group-item solution-item" id="W<%= solution.definition.referencedSolutionId %>"
									data-solutionId="<%= solution.definition.referencedSolutionId %>"
									data-workspaceId="<%= solution.id%>"
									data-versionId="NoVersionAvailable"
									data-tenantVersionId="<%= tenantVersionId %>">
								<span class="workspace-name"><%= solution.displayName %></span>
							</a>
						<%} %>
					</div>
			
			<% }); %>
		</div>

			<div class="modal-content">
				<div class="modal-header">
					<div class="row">
						<div class="form-group col-md-12">
							<% if (action === "Add") { %>
								<h3><%= Globalize.localize("admin.config.AppEnhancer.AddViewerParameter") %></h3>
							<% } else if (action === "Edit") { %>
								<h3><%= Globalize.localize("admin.config.AppEnhancer.EditViewerParameter") %></h3>
							<% } else if (action === "Delete") { %>

								src="/home/exampletenant/app/admin/web/images/status_errors.svg"
								width="20"
							/>
							<label />
						</div>
					</div>
				</div>
				<div class="modal-body">
					<% if (action === "Add" || action === "Edit") { %>
						<div class="row">
							<div class="col-md-12">
								<label class="control-label">
									<%= Globalize.localize("admin.config.Type") %>
								</label>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<input
										type="radio"
										name="ae-viewer-param-type"
										id="ae-viewer-param-type-custom"
										value="custom"
										<% if (type === "custom") { %>
											checked
										<% } %>
									>
									<label for="ae-viewer-param-type-custom">
										<%= Globalize.localize("admin.config.AppEnhancer.CustomProperty") %>
									</label>
								</div>
							</div>
							<div class="col-md-6">
								<div class="form-group">
									<input
										type="radio"
										name="ae-viewer-param-type"
										id="ae-viewer-param-type-entity"
										value="entity"
										<% if (type === "entity") { %>
											checked
										<% } %>
									>
									<label for="ae-viewer-param-type-entity">
										<%= Globalize.localize("admin.config.Entities.EntityProperty") %>
									</label>
								</div>
							</div>
						</div>
						<div
							id="ae-viewer-param-custom"
							class="row <%= type !== 'custom' ? 'hidden' : '' %>"
						>
							<div class="form-group col-md-6">
								<label for="ae-viewer-param-name-custom">
									<%= Globalize.localize("admin.config.Name") %>
								</label>
								<input
									type="text"
									class="form-control"
									id="ae-viewer-param-name-custom"
									value="<%= type === 'custom' ? name : '' %>"
									required
								/>
							</div>
							<div class="form-group col-md-6">
								<label for="ae-viewer-param-value-custom">
									<%= Globalize.localize("admin.config.Value") %>
								</label>
								<input
									type="text"
									class="form-control"
									id="ae-viewer-param-value-custom"
									value="<%= value %>"
									required
								/>
							</div>
						</div>
						<div
							id="ae-viewer-param-entity"
							class="row <%= type !== 'entity' ? 'hidden' : '' %>"
						>
							<div class="form-group col-md-12">
								<label for="ae-viewer-param-name-entity">
									<%= Globalize.localize("admin.config.Name") %>
								</label>
								<select
									title="<%= Globalize.localize('admin.config.Entities.SelectEntityProperty') %>"
									class="form-control"
									id="ae-viewer-param-name-entity"
								>
									<option
										value=""
										disabled
										<% if (type === "entity" && name === "" || type !== "entity") { %>
											selected
										<% } %>
									>
										<%= Globalize.localize("admin.config.Entities.SelectEntityProperty") %>
									</option>
									<% _.each(entityProperties, function (entityProperty) { %>
										<option
											value="<%= entityProperty %>"
											<% if (entityProperty === name) { %>
												selected
											<% } %>
										>
											<%= entityProperty %>
										</option>
									<% }); %>
								</select>
							</div>
						</div>
					<% } else if (action === "Delete") { %>
						<p><%= Globalize.localize("admin.config.AppEnhancer.DeleteViewerParameterConfirmMessage") %></p>
					<% } %>
				</div>
				<div class="modal-footer">
					<button
						class="btn btn-primary"
						data-dismiss="modal"
					>
						<% if (action === "Add") { %>
							<span><%= Globalize.localize("admin.config.AddButton") %></span>
						<% } else if (action === "Edit") { %>
							<span><%= Globalize.localize("admin.config.SaveButton") %></span>
						<% } else { %>
							<span><%= Globalize.localize("admin.config.OkButton") %></span>
						<% } %>
					</button>
					<button class="btn btn-cancel" data-dismiss="modal">
						<span><%= Globalize.localize("admin.config.CancelButton") %></span>
					</button>
				</div>
			</div>
		</div>
	</script>

			<% var self = this; if (this.model.getLayouts()) { %>
				<% _.each(this.model.getLayouts(), function (layout) { %>
					<a href="<%= self.model.getURL(layout.id) %>" class="list-group-item layout-selected" target="_blank">
						<span class="btn-link"><%= layout.name %></span>
					</a>
				<% }); %>
			<% } else { %>
				<a href="<%= self.model.getURL(null) %>" class="list-group-item entity-selected" target="_blank">
					<span class="btn-link"><%= this.model.getEntityName() %></span>
				</a>
			<%} %>
		</div>
	</script>		

	<script id="entity-list-search-configuration" type="template" class="template">
		<div class="row">
			<div class="col-md-12">
				<div class="form-group">
					<div style="display: flex; align-items: center; justify-content: flex-end; gap: 1rem; flex-wrap: wrap;">
						<button class="btn btn-primary" type="button" disabled>
							<%= Globalize.localize("admin.config.Entities.ConfigureFullTextSearch") %>
						</button>
						<button class="btn btn-cancel" type="button" disabled>
							<%= Globalize.localize("admin.config.Entities.GetSearchConfigurationStatus") %>
						</button>
					</div>
				</div>
			</div>
		</div>
	</script>

	<script id="entity-list-search-configuration-table" type="template" class="template">
		<table class="table table-hover">
			<thead>
				<tr>
					<% if (enableSelection) { %>
						<th style="width: 50px;">
							<div class="form-check text-center">
								<input class="form-check-input" type="checkbox" data-id="checkbox" />
							</div>
						</th>
					<% } %>
					<th>
						<div><%= Globalize.localize("admin.config.Entities") %></div>
					</th>
					<th>
						<div><%= Globalize.localize("admin.config.Status") %></div>
					</th>
				</tr>
			</thead>
			<tbody />
		</table>
	</script>

	<script id="entity-list-search-configuration-table-entry" type="template" class="template">
		<% if (enableSelection) { %>
			<td>
				<div class="form-check text-center">
					<input
						class="form-check-input"
						type="checkbox"
						data-id="<%= displayName %>"
						<%= selected ? "checked" : "" %>
					/>
				</div>
			</td>
		<% } %>
		<td>
			<div><%= displayName %></div>
		</td>
		<td></td>
	</script>

	<script id="entity-list-search-configuration-table-entry-status" type="template" class="template">
		<img
			src="/home/exampletenant/app/admin/web/images/<%= icon %>"
			alt="<%= text %>"
			style="margin-right: 0.5rem;"
			width="16" height="16"
		><%= text %>
	</script>

	<script>
			AdminConfig.layout = new Backbone.Layout({
				  template: "#layout",
				  
					events: {
				        "click .logoff": "doLogout",
						"change #orgSelection": "orgSelected",
						"change #configSelection": "configSelected"
					},
					
					el: ".main",
				  
				  views: {
					  "#solutions": new AdminConfig.Views.Solutions({model: new AdminConfig.Models.Solutions()}),
					  "#configurations": new AdminConfig.Views.Configurations({model: new AdminConfig.Models.Configurations()})
				  },
				  
					doLogout: function () {
						ot_App.doLogout();
					},
					
					loadTenant: function() {
					    ot_App.solutionManager.cleanCache();

					    AdminConfig.layout.views["#solutions"].model.fetch().done(function() {
					    	var solutionsView = AdminConfig.layout.getView("#solutions");
							solutionsView.render();
							solutionsView.solutionId = null;
							solutionsView.versionId = null;
							solutionsView.workspaceId = null;
							$("body").trigger("solutionDeleted");
						});						
					},
					
					orgSelected: function (e) {
						$(".configurable-elements-panel-col,.configuration-prop-panel-col").hide();
						$(".default-panel").show();
						var orgType = $('#orgSelection').val();
						var solutionModel = AdminConfig.layout.views["#solutions"].model;
						solutionModel.set("orgType", orgType);
						
						var tenantElement = ot_App.solutionManager.getCurrentUserTenantElement();
						if (orgType === "Shared" 
								&& tenantElement 
								&& tenantElement.definition
								&& tenantElement.definition.organizationId === 1) {								
								$("#show-config-droplist").show();
								 
						} else {
							$("#show-config-droplist").hide();
							if (orgType === "Shared") {
								solutionModel.set("orgType", "SharedForStriping");									
							}
						}
						
						this.loadTenant();
					},

					configSelected: function (e) {
						$(".configurable-elements-panel-col,.configuration-prop-panel-col").hide();
						$(".default-panel").show();
						var configType = $('#configSelection').val();
						var solutionModel = AdminConfig.layout.views["#solutions"].model;
						if (configType === "SystemOrg") {
							solutionModel.set("orgType", "SharedForStriping");
	
						} else {
							solutionModel.set("orgType", "Shared");
						}
						var solutionsView = AdminConfig.layout.getView("#solutions");
						solutionsView.render();
						solutionsView.solutionId = null;
						solutionsView.versionId = null;
						solutionsView.workspaceId = null;
						$("body").trigger("solutionDeleted");				
					},
			});
			
	        $("#alertDialog").hide();
		    
			AdminConfig.layout.views["#solutions"].model.fetch().done(function(){
				AdminConfig.layout.render();
			});		
		</script>
</body>
</html>
